<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โน้ตโน้ต</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Note something! (auto saved)</h1>
            <button id="theme-toggle" aria-label="Toggle Dark Mode">
                <img id="theme-icon" src="dark-mode.png" alt="Toggle Theme">
            </button>
        </header>
        <main>
            <textarea id="editor" placeholder="ลองพิมดู . . ."></textarea>
        </main>
        <footer>
            <span id="save-status">Saved</span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
