<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, inittial-scale1.0">
        <title>Countdown Workshop</title>
        <link rel="stylesheet" href="style.css">
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap');
        </style>
    </head>
    <body>
        <h1>Happy New Year : 2027</h1>
        <div class="countdown" id="countdown">
            <div class="time">
                <h2 id="days">00</h2>
                <small>วัน</small>
            </div>
            <div class="time">
                <h2 id="hours">00</h2>
                <small>ชั่วโมง</small>
            </div>
            <div class="time">
                <h2 id="minutes">00</h2>
                <small>นาที</small>
            </div>
            <div class="time">
                <h2 id="seconds">00</h2>
                <small>วินาที</small>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
